<!DOCTYPE html>
<html lang="zh-TW">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Content-Security-Policy"
    content="default-src 'self'; img-src 'self' file:; style-src 'self' 'unsafe-inline';" />
  <title>Simple Manga Viewer</title>
  <link rel="stylesheet" href="styles.css" />
</head>

<body>
  <!-- Top Toolbar -->
  <div id="toolbar">
    <button id="btn-open-dir" title="開啟漫畫目錄 (Ctrl+O)">📁 開啟目錄</button>
    <button id="btn-open-archive" title="開啟漫畫壓縮檔">📦 開啟壓縮檔</button>
    <div class="toolbar-separator"></div>

    <label class="toolbar-label">顯示模式:</label>
    <select id="select-fit-mode">
      <option value="fit-width">適合寬度</option>
      <option value="fit-height">適合高度</option>
      <option value="custom-width">指定寬度</option>
    </select>
    <input type="number" id="input-custom-width" value="800" min="200" max="4000" step="50" placeholder="寬度 px"
      style="display:none;" />

    <div class="toolbar-separator"></div>

    <label class="toolbar-label">頁面:</label>
    <select id="select-page-mode">
      <option value="single">單頁</option>
      <option value="double">雙頁</option>
      <option value="webtoon">垂直連續 (Webtoon)</option>
    </select>

    <div class="toolbar-separator"></div>

    <button id="btn-prev" title="上一頁 (PageUp / ←)">◀ 上一頁</button>
    <span id="page-indicator">0 / 0</span>
    <button id="btn-next" title="下一頁 (PageDown / →)">下一頁 ▶</button>

    <div class="toolbar-separator"></div>
    <button id="btn-slideshow" title="幻燈片播放 (P)">▶ 幻燈片</button>
    <input type="number" id="input-slideshow-interval" value="500" min="100" max="60000" step="100" title="播放間隔（毫秒）"
      style="width:65px;" />
    <span class="toolbar-label">ms</span>

    <div class="toolbar-separator"></div>
    <button id="btn-fullscreen" title="全螢幕切換 (F / F11)">🖥️ 全螢幕</button>

    <div class="toolbar-separator"></div>
    <button id="btn-help" title="快捷鍵說明">⌨ 快捷鍵</button>
    <button id="btn-keybind-settings" title="自訂快捷鍵設定">⚙ 設定</button>
  </div>

  <div id="main-container">
    <!-- Sidebar -->
    <div id="sidebar">
      <div id="sidebar-header">
        <button id="btn-parent" title="上層目錄">⬆ 上層</button>
        <span id="sidebar-title">目錄瀏覽</span>
      </div>
      <div id="sidebar-list"></div>
    </div>

    <div id="sidebar-resizer"></div>

    <!-- Viewer Area -->
    <div id="viewer-area">
      <div id="viewer-container">
        <div id="welcome-message">
          <h2>Simple Manga Viewer</h2>
          <p>點擊「開啟目錄」選擇漫畫資料夾開始閱讀</p>
          <p class="shortcut-hint">快捷鍵: Ctrl+O</p>
        </div>
        <div id="image-display" style="display:none;"></div>
      </div>
    </div>
  </div>

  <!-- Help Modal -->
  <div id="help-modal" class="modal" style="display:none;">
    <div class="modal-content">
      <h3>快捷鍵說明</h3>
      <div id="help-keybindings-list"></div>

      <p class="help-section-title">關於</p>
      <p id="app-version" class="help-version"></p>
      <button id="btn-close-help">關閉</button>
    </div>
  </div>

  <!-- Keybind Settings Modal -->
  <div id="keybind-modal" class="modal" style="display:none;">
    <div class="modal-content keybind-settings-content">
      <h3>⚙ 快捷鍵設定</h3>
      <p class="keybind-hint">點擊按鍵欄位後按下想要的按鍵來設定。點擊 ✕ 可移除單一按鍵。</p>
      <div id="keybind-list"></div>
      <div class="keybind-actions">
        <button id="btn-keybind-reset" class="btn-secondary">重設為預設值</button>
        <button id="btn-keybind-close">關閉</button>
      </div>
    </div>
  </div>

  <script src="renderer.js"></script>
</body>

</html>
