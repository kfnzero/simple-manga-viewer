<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6C63FF"/>
      <stop offset="100%" style="stop-color:#3F3D9E"/>
    </linearGradient>
    <linearGradient id="page" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFFFFF"/>
      <stop offset="100%" style="stop-color:#F0F0F0"/>
    </linearGradient>
  </defs>
  <!-- Rounded background -->
  <rect x="4" y="4" width="248" height="248" rx="40" ry="40" fill="url(#bg)"/>
  <!-- Back book page (shadow) -->
  <rect x="55" y="38" width="120" height="165" rx="6" fill="#2A2870" opacity="0.5" transform="rotate(5, 115, 120)"/>
  <!-- Front book page -->
  <rect x="45" y="35" width="120" height="165" rx="6" fill="url(#page)" stroke="#DDD" stroke-width="2"/>
  <!-- Manga panel lines on front page -->
  <line x1="55" y1="95" x2="155" y2="95" stroke="#CCC" stroke-width="2"/>
  <line x1="105" y1="45" x2="105" y2="95" stroke="#CCC" stroke-width="2"/>
  <line x1="55" y1="145" x2="155" y2="145" stroke="#CCC" stroke-width="2"/>
  <line x1="90" y1="95" x2="90" y2="145" stroke="#CCC" stroke-width="2"/>
  <!-- Speed lines in a panel (manga action feel) -->
  <line x1="60" y1="110" x2="82" y2="105" stroke="#999" stroke-width="1"/>
  <line x1="60" y1="118" x2="82" y2="115" stroke="#999" stroke-width="1"/>
  <line x1="60" y1="126" x2="82" y2="125" stroke="#999" stroke-width="1"/>
  <line x1="60" y1="134" x2="82" y2="133" stroke="#999" stroke-width="1"/>
  <!-- Star burst in top-right panel -->
  <polygon points="135,60 139,72 152,72 141,80 145,92 135,83 125,92 129,80 118,72 131,72" fill="#FFD93D"/>
  <!-- Text "MANGA" at bottom -->
  <text x="128" y="228" text-anchor="middle" font-family="Arial Black, Arial, sans-serif" font-weight="900" font-size="30" fill="#FFFFFF" letter-spacing="3">MANGA</text>
</svg>
